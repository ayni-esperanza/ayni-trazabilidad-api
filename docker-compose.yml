services:
  postgres:
    image: postgres:16-alpine
    container_name: ayni-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ayni_trazabilidad}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${POSTGRES_DB:-ayni_trazabilidad}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ayni-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ayni_trazabilidad}
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ayni_trazabilidad}
      BUCKET_BASE_URL: ${BUCKET_BASE_URL:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_PRESIGN_EXPIRATION_SECONDS: ${R2_PRESIGN_EXPIRATION_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
