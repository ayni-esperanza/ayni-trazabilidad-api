services:
  postgres:
    image: postgres:16-alpine
    container_name: ayni-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ayni_trazabilidad}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${POSTGRES_DB:-ayni_trazabilidad}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ayni-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ayni_trazabilidad}
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ayni_trazabilidad}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
