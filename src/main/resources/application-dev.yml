# ==================== CONFIGURACIÓN DE DESARROLLO ====================
# Activar con: SPRING_PROFILES_ACTIVE=dev

spring:
  # ==================== DATASOURCE DESARROLLO ====================
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # ==================== JPA/HIBERNATE DESARROLLO ====================
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO}
    show-sql: ${SHOW_SQL}
    properties:
      hibernate:
        format_sql: true # SQL formateado para legibilidad

  # ==================== FLYWAY DESHABILITADO EN DEV ====================
  flyway:
    enabled: false # No usar Flyway en desarrollo, permitir Hibernate gestionar schema

  devtools:
    livereload:
      enabled: false
    restart:
      log-condition-evaluation-delta: false

debug: true

# ==================== LOGGING DESARROLLO ====================
logging:
  level:
    root: INFO
    com.trazabilidad.ayni: ${LOG_LEVEL:DEBUG}
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# ==================== SWAGGER HABILITADO ====================
springdoc:
  swagger-ui:
    enabled: true

# ==================== ACTUATOR ====================
management:
  endpoints:
    web:
      exposure:
        include: "*" # Exponer todos los endpoints en desarrollo
  endpoint:
    health:
      show-details: always

# ==================== DATA INITIALIZER ====================
app:
  data-initializer:
    enabled: ${DATA_INITIALIZER_ENABLED}
