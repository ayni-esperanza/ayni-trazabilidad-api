# ==================== CONFIGURACIÓN DE PRODUCCIÓN ====================
# Activar con: SPRING_PROFILES_ACTIVE=prod
# TODAS LAS VARIABLES DEBEN ESTAR DEFINIDAS EN VARIABLES DE ENTORNO

spring:
  # ==================== DATASOURCE PRODUCCIÓN ====================
  datasource:
    url: ${DATABASE_URL:#{null}} # Obligatorio via variable de entorno
    username: ${DB_USERNAME:#{null}}
    password: ${DB_PASSWORD:#{null}}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: 20000
      leak-detection-threshold: 15000

  # ==================== JPA/HIBERNATE PRODUCCIÓN ====================
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate} # validate en prod; usar update solo para bootstrap controlado
    show-sql: false # No mostrar SQL en producción
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50 # Mayor batch size para producción
        cache:
          use_second_level_cache: false
          use_query_cache: false

  # ==================== FLYWAY HABILITADO EN PRODUCCIÓN ====================
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    locations: classpath:db/migration
    out-of-order: false
    placeholder-replacement: true

# ==================== LOGGING PRODUCCIÓN ====================
logging:
  level:
    root: WARN
    com.trazabilidad.ayni: INFO
    org.springframework.security: WARN
    org.hibernate: WARN # Deshabilitar todos los logs de Hibernate
    org.hibernate.SQL: OFF # Completamente deshabilitado
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
  file:
    name: ${LOG_FILE:/app/logs/ayni-trazabilidad.log}
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ==================== SWAGGER DESHABILITADO EN PRODUCCIÓN ====================
springdoc:
  swagger-ui:
    enabled: false # Desactivar Swagger en producción por seguridad
  api-docs:
    enabled: false

# ==================== ACTUATOR (Solo Health Check) ====================
management:
  endpoints:
    web:
      exposure:
        include: health # Solo health check en producción
  endpoint:
    health:
      show-details: never

# ==================== DATA INITIALIZER ====================
app:
  data-initializer:
    enabled: ${DATA_INITIALIZER_ENABLED:false}
  storage:
    bucket-base-url: ${BUCKET_BASE_URL:}
    r2:
      endpoint: ${R2_ENDPOINT:}
      bucket-name: ${R2_BUCKET_NAME:}
      access-key-id: ${R2_ACCESS_KEY_ID:}
      secret-access-key: ${R2_SECRET_ACCESS_KEY:}
      presign-expiration-seconds: ${R2_PRESIGN_EXPIRATION_SECONDS:300}

# ==================== RATE LIMITING PRODUCCIÓN ====================
resilience4j:
  ratelimiter:
    instances:
      authLimiter:
        limit-for-period: ${RATE_LIMIT_AUTH:3} # Solo 3 intentos por minuto en producción
        limit-refresh-period: 1m
        timeout-duration: 0s
      apiLimiter:
        limit-for-period: ${RATE_LIMIT_API:60} # Máximo 60 requests por minuto
        limit-refresh-period: 1m
        timeout-duration: 0s

# ==================== SEGURIDAD ADICIONAL ====================
server:
  error:
    include-message: never # No exponer mensajes de error detallados
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
