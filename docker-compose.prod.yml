services:
  postgres:
    ports: []
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

  api:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATA_INITIALIZER_ENABLED: "false"
      LOG_LEVEL: WARN
      SHOW_SQL: "false"
      DDL_AUTO: validate
      RATE_LIMIT_AUTH: ${RATE_LIMIT_AUTH:-3}
      RATE_LIMIT_API: ${RATE_LIMIT_API:-60}
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-false}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    ports:
      - "127.0.0.1:${API_PUBLIC_PORT:-8080}:8080"
