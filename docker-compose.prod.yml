services:
  postgres:
    image: postgres:16-alpine
    container_name: ayni-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ayni-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DATA_INITIALIZER_ENABLED: "false"
      LOG_LEVEL: WARN
      SHOW_SQL: "false"
      DDL_AUTO: ${DDL_AUTO:-validate}
      RATE_LIMIT_AUTH: ${RATE_LIMIT_AUTH:-3}
      RATE_LIMIT_API: ${RATE_LIMIT_API:-60}
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-false}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-50MB}
      MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE:-55MB}
      STORAGE_MAX_FINAL_DOCUMENT_SIZE: ${STORAGE_MAX_FINAL_DOCUMENT_SIZE:-25MB}
      STORAGE_MAX_PDF_SOURCE_SIZE: ${STORAGE_MAX_PDF_SOURCE_SIZE:-50MB}
      STORAGE_MAX_SPREADSHEET_SOURCE_SIZE: ${STORAGE_MAX_SPREADSHEET_SOURCE_SIZE:-50MB}
      PDF_GHOSTSCRIPT_ENABLED: ${PDF_GHOSTSCRIPT_ENABLED:-true}
      PDF_GHOSTSCRIPT_COMMAND: ${PDF_GHOSTSCRIPT_COMMAND:-}
      PDF_GHOSTSCRIPT_TIMEOUT_SECONDS: ${PDF_GHOSTSCRIPT_TIMEOUT_SECONDS:-120}
      LOG_FILE: ${LOG_FILE:-/app/logs/ayni-trazabilidad.log}
      BUCKET_BASE_URL: ${BUCKET_BASE_URL:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_PRESIGN_EXPIRATION_SECONDS: ${R2_PRESIGN_EXPIRATION_SECONDS:-300}
    ports:
      - "127.0.0.1:${API_PUBLIC_PORT:-8080}:8080"

volumes:
  postgres_data:
